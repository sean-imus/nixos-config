[general]
bars = 24
sensitivity = 40
sleep_timer = 5
noise_reduction = 88

[input]
method = pulse
source = auto

[output]
method = sdl_glsl
raw_target = /dev/stdout
data_format = ascii
sdl_width = 200
sdl_height = 20
continuous_rendering = 1
vertex_shader = pass_through.vert
fragment_shader = bar_spectrum.frag

[color]
background = '#00000000'
foreground = '#ffffff'
gradient = 1
gradient_count = 4
gradient_color_1 = '#00ff88'
gradient_color_2 = '#ffcc00'
gradient_color_3 = '#ff6600'
gradient_color_4 = '#ff0066'
